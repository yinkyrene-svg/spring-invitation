<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>善緣雅集 · 邀請函</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');

        :root {
            --gold: #8b6914; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; overflow: hidden; background-color: #000; font-family: 'Noto Serif SC', serif; }
        .swiper { width: 100%; height: 100%; }
        
        .swiper-slide {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            position: relative;
        }

        /* 二维码容器适配方案 */
        .qr-container {
            position: absolute;
            top: 18%;      
            left: 50%;
            transform: translateX(-50%);
            width: 55%;    
            aspect-ratio: 1 / 1; 
            z-index: 100;
            background-color: rgba(248, 242, 227, 0.92); 
            padding: 15px;
            border-radius: 4px;
            border: 1px solid rgba(139, 105, 20, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            animation: qrFade 3s ease-in-out infinite;
        }

        @keyframes qrFade {
            0%, 100% { opacity: 0.95; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.02); }
        }

        /* 引用你上传到 GitHub 的 qr.jpg */
        .real-qr-img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 8px;
            border: 1px solid #eee;
        }

        .qr-tip-zh {
            font-size: 0.85rem;
            color: var(--gold);
            letter-spacing: 2px;
            margin-top: 5px;
            font-weight: 700;
        }

        .qr-sub-tip {
            font-size: 0.6rem; 
            color: #666; 
            margin-top: 2px;
            letter-spacing: 1px;
        }

        .up-arrow {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            z-index: 10;
            animation: bounce 2s infinite;
            opacity: 0.6;
            pointer-events: none;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-10px); }
            60% { transform: translateX(-50%) translateY(-5px); }
        }
    </style>
</head>
<body>

<div class="swiper mySwiper">
    <div class="swiper-wrapper">
        <div class="swiper-slide" style="background-image: url('bg1.jpg');"></div>
        <div class="swiper-slide" style="background-image: url('bg2.jpg');"></div>
        
        <div class="swiper-slide" style="background-image: url('bg3.jpg');">
            <div class="qr-container">
                <img src="qr.jpg" alt="爱心认捐二维码" class="real-qr-img">
                <div class="qr-tip-zh">愛心認捐 · 善款直達</div>
                <div class="qr-sub-tip">· 長按識別二维码 ·</div>
            </div>
        </div>
        
        <div class="swiper-slide" style="background-image: url('bg4.jpg');"></div>
    </div>
    
    <div class="up-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    var swiper = new Swiper(".mySwiper", {
        direction: "vertical",
        mousewheel: true,
        resistanceRatio: 0.5
    });
</script>
</body>
</html>
