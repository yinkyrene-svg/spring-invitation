<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>善缘雅集 · 邀请函</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 页面基础设置，禁止溢出滚动，防止背景拉伸 */
        body, html { 
            height: 100%; 
            overflow: hidden; 
            background-color: #000; 
        }

        .swiper { 
            width: 100%; 
            height: 100%; 
        }
        
        /* 设置每一页的背景图样式 */
        .swiper-slide {
            width: 100%;
            height: 100%;
            background-size: cover;    /* 确保图片撑满屏幕而不留白 */
            background-position: center top; /* 手机端优先对齐顶部，确保视觉重心正确 */
            background-repeat: no-repeat;
        }

        /* 向上滑动提示小箭头 */
        .up-arrow {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            z-index: 10;
            animation: bounce 2s infinite;
            opacity: 0.6;
            pointer-events: none; /* 确保不影响手指滑动操作 */
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-10px); }
            60% { transform: translateX(-50%) translateY(-5px); }
        }
    </style>
</head>
<body>

<div class="swiper mySwiper">
    <div class="swiper-wrapper">
        <div class="swiper-slide" style="background-image: url('bg1.jpg');"></div>
        
        <div class="swiper-slide" style="background-image: url('bg2.jpg');"></div>
        
        <div class="swiper-slide" style="background-image: url('bg3.jpg');"></div>
        
        <div class="swiper-slide" style="background-image: url('bg4.jpg');"></div>
    </div>
    
    <div class="up-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    var swiper = new Swiper(".mySwiper", {
        direction: "vertical",      /* 开启纵向翻页 */
        mousewheel: true,           /* 支持鼠标滚轮 */
        resistanceRatio: 0.5,       /* 增加边缘回弹阻尼感，提升质感 */
        grabCursor: true,           /* 电脑端显示抓取手势 */
    });
</script>
</body>
</html>
